<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Crypto Miner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            padding-bottom: 50px;
            overflow-y: auto;
            overflow-x: hidden;
            color: white;
            font-family: "Segoe UI", "Inter", sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0033 100%);
            position: relative;
        }

        .portfolio-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
            background: rgba(100, 50, 200, 0.3);
            border: 1px solid rgba(150, 100, 255, 0.5);
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .portfolio-btn:hover {
            background: rgba(150, 100, 255, 0.5);
            border-color: rgba(200, 150, 255, 0.8);
            color: white;
            transform: translateY(-1px);
        }

        #miner-app-container {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            pointer-events: auto;
        }

        h2 {
            text-align: center;
            margin-top: 100px;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <a href="https://ckenedi.vip" target="_blank" class="portfolio-btn">← Portfolio</a>

    <div id="miner-app-container">
        <h2>Loading Mining Interface...</h2>
    </div>

    <script src="miner.js"></script>
</body>
</html>
