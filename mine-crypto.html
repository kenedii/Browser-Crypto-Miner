    <style>
        /* Standalone page specific styles to center the miner */
        body {
            margin: 0;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: white;
            font-family: "Segoe UI", "Inter", sans-serif;
            padding-top: 150px;
            padding-bottom: 50px;
            box-sizing: border-box;
        }
        #miner-app-container {
            position: relative;
            z-index: 9999; /* Ensure it's on top of everything */
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px;
            pointer-events: auto; /* Ensure clickable */
        }
        
        /* Ensure the body allows content to sit on top of fixed backgrounds */
        .content-wrapper {
            position: relative;
            z-index: 10;
        }
        
        /* Nav back to home */
        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .home-link:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
    </style>
</head>
